<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>歡迎收聽</title>
    <link
      rel="preload"
      href="fusion-pixel-12px-zh-hant.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="styles.css?v=20260613-3" />
    <style>
      /* Critical UI styles stay inline so hosting caches cannot hide the controls. */
      .player-card {
        position: relative;
      }

      .netease-link {
        position: absolute;
        top: 20px;
        right: 20px;
      }

      .playlist {
        margin-top: 22px;
        text-align: left;
      }

      .select-wrap {
        position: relative;
      }

      .select-wrap::after {
        position: absolute;
        top: 50%;
        right: 18px;
        width: 9px;
        height: 9px;
        pointer-events: none;
        content: "";
        border-right: 2px solid #fb7185;
        border-bottom: 2px solid #fb7185;
        transform: translateY(-70%) rotate(45deg);
      }

      #track-select {
        appearance: none;
        width: 100%;
        padding: 16px 48px 16px 18px;
        color: #e4e4e7;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        background: #27272a;
        border: 1px solid rgba(251, 113, 133, 0.5);
        border-radius: 14px;
        outline: none;
      }
    </style>
    <script src="app.js?v=20260613-3" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="player-card" aria-labelledby="page-title">
        <a
          class="netease-link"
          href="https://music.163.com/#/artist?id=125226318"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="前往李思琰的網易雲音樂主頁"
          title="網易雲音樂主頁"
        >
          <span class="netease-logo" aria-hidden="true">◎</span>
        </a>

        <p class="eyebrow">MY PLAYLIST</p>
        <h1 id="page-title">歡迎收聽</h1>
        <p class="description">選一首歌，讓音樂陪你一會兒。</p>

        <div class="now-playing" aria-live="polite">
          <span>目前播放</span>
          <strong id="current-track">Whispers of the Wild</strong>
        </div>

        <div class="player-frame">
          <iframe
            id="music-player"
            title="網易雲音樂播放器"
            frameborder="0"
            border="0"
            marginwidth="0"
            marginheight="0"
            width="330"
            height="86"
            src="https://music.163.com/outchain/player?type=2&id=3393296463&auto=1&height=66"
            allow="autoplay"
          ></iframe>
        </div>

        <div class="playlist">
          <label for="track-select">選擇歌曲</label>
          <div class="select-wrap">
            <select id="track-select" aria-label="選擇要播放的歌曲">
              <option value="3393296463" data-track-name="Whispers of the Wild">
                01　Whispers of the Wild
              </option>
              <option value="3393012424" data-track-name="できるよサイン(你能做到)">
                02　できるよサイン(你能做到)
              </option>
            </select>
          </div>
        </div>

        <p class="note">若瀏覽器阻擋自動播放，請手動按下播放器的播放鍵。</p>
      </section>
    </main>
  </body>
</html>
